name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.KONTAK_SSH_KEY }}
          known_hosts: unnecessary
          config: |
            Host kontak
              HostName ${{ secrets.KONTAK_HOST }}
              User ${{ secrets.KONTAK_USER }}
              StrictHostKeyChecking no

      - name: Rsync to VPS
        run: |
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.screenshots' \
            . kontak:/opt/getfira/

      - name: Build and deploy
        run: |
          ssh kontak "cd /opt/getfira && ./deploy/scripts/deploy.sh"
