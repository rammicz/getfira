services:
  getfira-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: getfira-app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - getfira-net

  nginx:
    image: nginx:alpine
    container_name: getfira-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/getfira.conf:/etc/nginx/conf.d/getfira.conf:ro
    depends_on:
      getfira-app:
        condition: service_healthy
    networks:
      - getfira-net

networks:
  getfira-net:
    driver: bridge
