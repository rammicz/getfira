services:
  getfira-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: getfira-app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  default:
    name: getfira-net
