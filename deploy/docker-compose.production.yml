services:
  getfira-app:
    image: ghcr.io/rammicz/getfira:latest
    container_name: getfira-app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - getfira-net

  nginx:
    image: nginx:alpine
    container_name: getfira-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/getfira.conf:/etc/nginx/conf.d/getfira.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/conf.d/ssl-params.conf:ro
      - ./nginx/app-placeholder.html:/usr/share/nginx/html/app-placeholder.html:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      getfira-app:
        condition: service_healthy
    networks:
      - getfira-net

  certbot:
    image: certbot/certbot
    container_name: getfira-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Renewal runs via deploy/scripts/renew-ssl.sh on a host cron
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - getfira-net

volumes:
  certbot-webroot:
  certbot-certs:

networks:
  getfira-net:
    driver: bridge
