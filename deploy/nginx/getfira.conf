# HTTP-only config — SSL added later via FIR-63

# Redirect www to apex
server {
    listen 80;
    listen [::]:80;
    server_name www.getfira.io;
    return 301 http://getfira.io$request_uri;
}

# Main site
server {
    listen 80;
    listen [::]:80;
    server_name getfira.io;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://getfira-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://getfira-app:8080/health;
        access_log off;
    }
}

# Placeholder: app.getfira.io
server {
    listen 80;
    listen [::]:80;
    server_name app.getfira.io;

    root /usr/share/nginx/html;

    location / {
        return 200 '<h1>app.getfira.io</h1><p>Coming soon.</p>';
        add_header Content-Type text/html;
    }
