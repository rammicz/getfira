# Redirect www to apex domain
server {
    listen 80;
    listen [::]:80;
    server_name www.getfira.io;
    return 301 https://getfira.io$request_uri;
}

# Redirect HTTP to HTTPS for all domains
server {
    listen 80;
    listen [::]:80;
    server_name getfira.io app.getfira.io;

    # Allow certbot challenges over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main site: getfira.io
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name getfira.io;

    ssl_certificate /etc/letsencrypt/live/getfira.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getfira.io/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://getfira-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check passthrough
    location /health {
        proxy_pass http://getfira-app:8080/health;
        access_log off;
    }
}

# HTTPS redirect for www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.getfira.io;

    ssl_certificate /etc/letsencrypt/live/getfira.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getfira.io/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    return 301 https://getfira.io$request_uri;
}

# Placeholder: app.getfira.io (future Firo app)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.getfira.io;

    ssl_certificate /etc/letsencrypt/live/getfira.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getfira.io/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    root /usr/share/nginx/html;

    location / {
        try_files /app-placeholder.html =503;
    }
}
